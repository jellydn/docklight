name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install

      - name: Typecheck server
        working-directory: server
        run: bun run typecheck

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Typecheck client
        working-directory: client
        run: bun run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install

      - name: Lint server
        working-directory: server
        run: bun run lint

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Lint client
        working-directory: client
        run: bun run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install server dependencies
        working-directory: server
        run: bun install

      - name: Test server
        working-directory: server
        run: bun run test

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Test client
        working-directory: client
        run: bun run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install client dependencies
        working-directory: client
        run: bun install

      - name: Install Playwright browsers
        working-directory: client
        run: npx playwright install chromium --with-deps

      - name: Build client
        working-directory: client
        run: bun run build

      - name: Run E2E tests
        working-directory: client
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
